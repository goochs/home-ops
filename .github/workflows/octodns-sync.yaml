---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: octodns-sync

on:
  push:
    branches: ["main"]
    paths:
      - octodns/**
      - .github/workflows/octodns*.yaml

jobs:
  octodns-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install the project
        run: uv sync --extra octodns
      - name: Validate octodns config
        env:
          OCTODNS_CF_TOKEN: placeholder
        run: |
          uv run octodns-validate --config-file=./octodns/config.yaml --all
  octodns-sync:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install the project
        run: uv sync --extra octodns
      - name: Load secret
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OCTODNS_CF_TOKEN: op://home-k8s/octodns/cfToken
      - name: Apply octodns config
        run: |
          uv run octodns-sync --config-file=./octodns/config.yaml --doit --force
