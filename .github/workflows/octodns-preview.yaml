---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: octodns-preview

on:
  pull_request_target:
    branches: ["main"]
    paths:
      - octodns/**
      - .github/workflows/octodns*.yaml

jobs:
  octodns-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Install the project
        run: uv sync --extra octodns
      - name: Validate octodns config
        env:
          OCTODNS_CF_TOKEN: placeholder
        run: |
          uv run octodns-validate --config-file=./octodns/config.yaml --all
  octodns-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Install the project
        run: uv sync --extra octodns
      - name: Load secret
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OCTODNS_CF_TOKEN: op://home-k8s/octodns/cfToken
      - name: Preview octodns config
        run: |
          uv run octodns-sync --config-file=./octodns/config.yaml | tee octodns-preview.md
      - name: Generate Github preview
        id: preview
        run: |
          cat octodns-preview.md
          echo "preview<<EOF" >> $GITHUB_OUTPUT
          cat octodns-preview.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Add comment
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3
        with:
          message-failure: Diff was not successful
          message: |
            ${{ steps.preview.outputs.preview }}
